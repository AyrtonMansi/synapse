# Synapse Production Nginx Configuration
# Place at: /etc/nginx/nginx.conf or mount as volume
# Handles: TLS termination, reverse proxy, WebSocket upgrade

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=100r/s;

    # Upstream definitions
    upstream gateway_api {
        server gateway-api:3001;
        keepalive 32;
    }

    upstream router {
        server router:3002;
        keepalive 32;
    }

    # HTTP -> HTTPS redirect (when TLS enabled)
    server {
        listen 80;
        server_name _;
        
        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Redirect all HTTP to HTTPS (uncomment when TLS ready)
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Or proxy directly for testing without TLS
        location / {
            return 200 "Synapse API - Use HTTPS in production\n";
            add_header Content-Type text/plain;
        }
    }

    # API Gateway Server
    server {
        listen 443 ssl http2;
        server_name api.example.com;  # CHANGE THIS

        # SSL certificates (paths for Let's Encrypt or custom)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS config
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS headers (allow Vercel deployments)
        map $http_origin $cors_origin {
            default "";
            "~^https://.*\.vercel\.app$" $http_origin;
            "https://app.example.com" $http_origin;  # CHANGE THIS
            "https://synapse.example.com" $http_origin;  # CHANGE THIS
        }

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://gateway_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints with rate limiting
        location / {
            limit_req zone=api burst=20 nodelay;

            # CORS
            if ($cors_origin != "") {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
            }

            # Preflight
            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://gateway_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for long-running inference
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # WebSocket Router Server
    server {
        listen 443 ssl http2;
        server_name ws.example.com;  # CHANGE THIS

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # WebSocket endpoint
        location /ws {
            limit_req zone=ws burst=100 nodelay;

            proxy_pass http://router;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Long timeouts for persistent connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check
        location /health {
            proxy_pass http://router;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # Default server (reject unknown hosts)
    server {
        listen 443 ssl default_server;
        server_name _;
        
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        return 444;
    }
}
