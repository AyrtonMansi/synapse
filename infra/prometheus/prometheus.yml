global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
  - static_configs:
    - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
    - targets: ['localhost:9090']

  - job_name: 'gateway-api'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - synapse
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      action: keep
      regex: gateway-api
    - source_labels: [__meta_kubernetes_pod_ip]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:3001
    metrics_path: /metrics

  - job_name: 'router'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names:
        - synapse
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      action: keep
      regex: router
    - source_labels: [__meta_kubernetes_pod_ip]
      action: replace
      target_label: __address__
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:3002

  - job_name: 'postgres'
    static_configs:
    - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
    - targets: ['redis-exporter:9121']

  - job_name: 'node'
    static_configs:
    - targets: ['node-exporter:9100']
