apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  namespace: synapse
  labels:
    app: coordinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coordinator
  template:
    metadata:
      labels:
        app: coordinator
    spec:
      containers:
        - name: coordinator
          image: ghcr.io/ayrtonmansi/synapse-coordinator:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: synapse-config
          env:
            - name: ROUTER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: ROUTER_AUTH_TOKEN
            - name: COORDINATOR_ID
              value: "global-1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  namespace: synapse
spec:
  selector:
    app: coordinator
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
