apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: synapse-secrets
  namespace: synapse
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: synapse-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_SIGNING_KEY
      remoteRef:
        key: synapse/production
        property: api-signing-key
    
    - secretKey: HSK_PRIVATE_KEY
      remoteRef:
        key: synapse/production
        property: hsk-private-key
    
    - secretKey: SETTLEMENT_KEY
      remoteRef:
        key: synapse/production
        property: settlement-key
    
    - secretKey: ROUTER_AUTH_TOKEN
      remoteRef:
        key: synapse/production
        property: router-auth-token
    
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: synapse/production
        property: postgres-password
    
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: synapse/production
        property: redis-password
