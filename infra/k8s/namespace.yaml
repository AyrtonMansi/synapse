apiVersion: v1
kind: Namespace
metadata:
  name: synapse
  labels:
    name: synapse
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: synapse
type: Opaque
stringData:
  url: "postgres://synapse:REPLACE_WITH_PASSWORD@postgres:5432/synapse"
  password: "REPLACE_WITH_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: synapse
type: Opaque
stringData:
  url: "redis://redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: synapse
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_JWT_SECRET"
  api-key-salt: "REPLACE_WITH_SALT"
