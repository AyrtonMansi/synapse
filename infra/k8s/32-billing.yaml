apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: synapse
  labels:
    app: billing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
        - name: billing
          image: ghcr.io/ayrtonmansi/synapse-billing:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: synapse-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing
  namespace: synapse
spec:
  selector:
    app: billing
  ports:
    - port: 3005
      targetPort: 3005
  type: ClusterIP
