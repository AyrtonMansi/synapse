apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: synapse
  labels:
    app: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
        - name: web-ui
          image: ghcr.io/ayrtonmansi/synapse-web-ui:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: synapse
spec:
  selector:
    app: web-ui
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
