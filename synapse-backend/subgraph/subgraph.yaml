specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SynapseJobManager
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000" # Replace with deployed contract
      abi: SynapseJobManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Job
        - Payment
        - ReputationUpdate
      abis:
        - name: SynapseJobManager
          file: ./abis/SynapseJobManager.json
      eventHandlers:
        - event: JobCreated(indexed bytes32,indexed address,bytes32,uint256,uint256)
          handler: handleJobCreated
        - event: JobAssigned(indexed bytes32,indexed address)
          handler: handleJobAssigned
        - event: JobCompleted(indexed bytes32,bytes32,uint256)
          handler: handleJobCompleted
        - event: JobCancelled(indexed bytes32)
          handler: handleJobCancelled
        - event: PaymentReleased(indexed bytes32,indexed address,uint256)
          handler: handlePaymentReleased
        - event: PaymentDisputed(indexed bytes32,indexed address,string)
          handler: handlePaymentDisputed
        - event: ReputationUpdated(indexed address,int256,string)
          handler: handleReputationUpdated
      file: ./src/mapping.ts
  - kind: ethereum
    name: SynapseRateLimiter
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: SynapseRateLimiter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - RateLimit
        - QuotaUsage
      abis:
        - name: SynapseRateLimiter
          file: ./abis/SynapseRateLimiter.json
      eventHandlers:
        - event: QuotaUpdated(indexed address,uint256,uint256,uint256)
          handler: handleQuotaUpdated
        - event: QuotaExceeded(indexed address,uint256)
          handler: handleQuotaExceeded
      file: ./src/rateMapping.ts