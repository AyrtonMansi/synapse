    <style>
      html, body { background-color: #0a0a0a !important; color: #e5e5e5 !important; margin: 0; padding: 0; }
      #root { min-height: 100vh; background-color: #0a0a0a !important; }
    </style>
    <script type="text/javascript">
      // IPFS routing fix - handle direct links to routes
      (function() {
        const path = window.location.pathname;
        const hash = window.location.hash;
        if (path !== '/' && !path.includes('.') && !hash) {
          const redirect = '/#' + path;
          window.location.replace(redirect);
        }
      })();
    </script>
  </head>
  <body style="background-color: #0a0a0a; color: #e5e5e5;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
