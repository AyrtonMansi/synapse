<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Synapse Mobile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; min-height: 100vh; }
    .header { padding: 20px 16px; background: rgba(15,23,42,0.95); position: sticky; top: 0; }
    .header h1 { font-size: 24px; }
    .content { padding: 16px; padding-bottom: 100px; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .stat { background: var(--card); border-radius: 12px; padding: 16px; }
    .stat-label { font-size: 12px; color: #94a3b8; }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0 24px; border-top: 1px solid rgba(255,255,255,0.1); }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 11px; }
    .nav-item.active { color: var(--primary); }
    .btn { background: var(--primary); color: #0f172a; border: none; padding: 16px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 12px; }
    .btn-danger { background: #f87171; color: white; }
    .status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; background: rgba(52,211,153,0.2); color: #34d399; }
    .pulse { width: 8px; height: 8px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</head>
<body>
  <div class="header">
    <h1>Node Monitor</h1>
  </div>
  <div class="content">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <span class="status"><span class="pulse"></span> Active</span>
        <span style="color:#94a3b8; font-size:13px;">2h 34m</span>
      </div>
      <div style="text-align:center;">
        <div style="font-size:12px; color:#94a3b8; margin-bottom:4px;">Total Earnings</div>
        <div style="font-size:36px; font-weight:800; color:var(--primary);">2,456.78</div>
        <div style="font-size:14px; color:#94a3b8;">SYN</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">GPU Temp</div>
        <div class="stat-value" style="color:#f87171;">72°C</div>
      </div>
      <div class="stat">
        <div class="stat-label">Utilization</div>
        <div class="stat-value" style="color:var(--primary);">89%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Power</div>
        <div class="stat-value" style="color:#fbbf24;">320W</div>
      </div>
      <div class="stat">
        <div class="stat-label">Jobs</div>
        <div class="stat-value" style="color:#a78bfa;">1,247</div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px;">Quick Actions</h3>
      <button class="btn">Claim Rewards</button>
      <button class="btn btn-danger" style="margin-top:8px;">Emergency Stop</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="#" class="nav-item active">Dashboard</a>
    <a href="#" class="nav-item">GPU</a>
    <a href="#" class="nav-item">Jobs</a>
    <a href="#" class="nav-item">Wallet</a>
  </nav>
  <script>
    // Simulate real-time updates
    setInterval(() => {
      const temp = 70 + Math.random() * 10;
      document.querySelector('.stat-value').textContent = Math.round(temp) + '°C';
    }, 3000);
    
    // Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
