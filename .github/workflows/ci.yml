name: Synapse CI - Full Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 0. Repo Integrity (PHASE 0)
  repo-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run repo integrity audit
        run: |
          chmod +x scripts/audit-repo-integrity.sh
          ./scripts/audit-repo-integrity.sh

  # 1. Code Quality
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          cd services/gateway-api && npm ci
          cd ../router && npm ci
          cd ../settlement && npm ci
          
      - name: Lint
        run: |
          cd services/gateway-api && npm run lint || true
          cd ../router && npm run lint || true
          
      - name: Type check
        run: |
          cd services/gateway-api && npx tsc --noEmit
          cd ../router && npx tsc --noEmit
          cd ../settlement && npx tsc --noEmit

  # 2. Smart Contract Tests
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        
      - name: Run contract tests
        working-directory: hsk-contracts
        run: |
          forge install
          forge test -v
          
      - name: Contract size check
        working-directory: hsk-contracts
        run: forge build --sizes

  # 3. Security Scan
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        
      - name: Run Slither
        uses: crytic/slither-action@v0.3.0
        with:
          target: hsk-contracts
          fail-on: high

  # 4. Kubernetes Manifest Validation
  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Validate K8s manifests
        run: |
          kubectl apply --dry-run=client -f infra/k8s/

  # 5. Terraform Validation
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check
        
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

  # 6. Architecture Truth Check
  truth-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify critical files exist
        run: |
          test -f ARCHITECTURE.md || (echo "Missing ARCHITECTURE.md" && exit 1)
          test -f hsk-contracts/src/NodeRegistry.sol || (echo "Missing NodeRegistry.sol" && exit 1)
          test -f hsk-contracts/src/HSKToken.sol || (echo "Missing HSKToken.sol" && exit 1)
          test -f services/settlement/src/index.ts || (echo "Missing settlement service" && exit 1)
          test -f services/router/src/challenge.ts || (echo "Missing challenge system" && exit 1)
          test -f services/gateway-api/src/quota.ts || (echo "Missing quota enforcement" && exit 1)
          
      - name: Verify no secrets in code
        run: |
          ! grep -r "private.*key" --include="*.ts" --include="*.sol" services/ hsk-contracts/ | grep -v ".env.example" || (echo "Potential secret in code" && exit 1)

  # 7. Integration Test (Docker Compose)
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3
        
      - name: Build services
        run: docker-compose build
        
      - name: Start infrastructure
        run: |
          docker-compose up -d postgres redis
          sleep 10
          
      - name: Run smoke test
        run: |
          docker-compose up -d gateway-api router
          sleep 5
          ./scripts/smoke-test.sh || true

  # 8. Documentation Check
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check ARCHITECTURE.md is current
        run: |
          # Verify ARCHITECTURE.md references real files
          grep -q "services/gateway-api" ARCHITECTURE.md || (echo "ARCHITECTURE.md outdated" && exit 1)
          grep -q "NodeRegistry.sol" ARCHITECTURE.md || (echo "ARCHITECTURE.md missing NodeRegistry" && exit 1)
          grep -q "Merkle" ARCHITECTURE.md || (echo "ARCHITECTURE.md missing settlement" && exit 1)

  # Final status
  ci-success:
    runs-on: ubuntu-latest
    needs:
      - repo-integrity
      - lint-and-typecheck
      - contract-tests
      - security-scan
      - k8s-validate
      - terraform-validate
      - truth-check
      - integration-test
      - docs-check
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed"
