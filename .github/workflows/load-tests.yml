name: Load Tests

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'spike'
        type: choice
        options:
          - spike
          - soak
          - stress
      target_url:
        description: 'Target URL'
        required: true
        default: 'https://api.synapse.sh'

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.48.0'

      - name: Run Spike Test
        if: github.event.inputs.test_type == 'spike' || github.event_name == 'schedule'
        env:
          API_URL: ${{ github.event.inputs.target_url || 'https://api.synapse.sh' }}
          API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          k6 run --out json=results-spike.json tests/load/spike-test.js

      - name: Run Soak Test
        if: github.event.inputs.test_type == 'soak'
        env:
          API_URL: ${{ github.event.inputs.target_url }}
          API_KEY: ${{ secrets.TEST_API_KEY }}
        run: |
          k6 run --out json=results-soak.json tests/load/soak-test.js

      - name: Run Stress Test
        if: github.event.inputs.test_type == 'stress'
        env:
          API_URL: ${{ github.event.inputs.target_url || 'https://api.synapse.sh' }}
        run: |
          k6 run --out json=results-stress.json tests/load/stress-test.js

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results-*.json

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('results-spike.json', 'utf8');
            const lines = results.split('\n').filter(l => l);
            const lastResult = JSON.parse(lines[lines.length - 1]);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Load Test Results\n\n- P95 Latency: ${lastResult.metrics.http_req_duration['p(95)']}ms\n- Error Rate: ${lastResult.metrics.errors.rate * 100}%\n- Requests: ${lastResult.metrics.http_reqs.count}`
            });
