version: '3.8'

services:
  gateway-api:
    build: ./services/gateway-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ROUTER_URL=http://router:3002
      - DATABASE_URL=/app/data/gateway.db
    volumes:
      - gateway-data:/app/data
    depends_on:
      - router
    networks:
      - synapse

  router:
    build: ./services/router
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    networks:
      - synapse

  node-agent:
    build: ./services/node-agent
    environment:
      - ROUTER_URL=ws://router:3002/ws
      - NODE_WALLET=${NODE_WALLET:-0xStubNodeWallet123}
      - MODEL_PROFILE=${MODEL_PROFILE:-echo-stub}
      - NODE_ID=${NODE_ID:-stub-node-001}
    depends_on:
      - router
    networks:
      - synapse

  # GPU Node with vLLM - use: docker compose --profile gpu up -d
  vllm-node:
    build: ./services/node-agent
    profiles:
      - gpu
    environment:
      - ROUTER_URL=ws://router:3002/ws
      - NODE_WALLET=${VLLM_NODE_WALLET:-0xVLLMNodeWallet456}
      - MODEL_PROFILE=${VLLM_MODEL_PROFILE:-vllm}
      - NODE_ID=${VLLM_NODE_ID:-vllm-node-001}
      - VLLM_URL=${VLLM_URL:-http://vllm:8000/v1}
    depends_on:
      - router
      - vllm
    networks:
      - synapse

  vllm:
    image: vllm/vllm-openai:latest
    profiles:
      - gpu
    command: >
      --model deepseek-ai/DeepSeek-V3
      --tensor-parallel-size 1
      --dtype float16
      --max-model-len 4096
      --api-key sk-vllm-local
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/root/.cache/huggingface
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - synapse

  web-ui:
    build: ./services/web-ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - gateway-api
    networks:
      - synapse

volumes:
  gateway-data:
  huggingface-cache:

networks:
  synapse:
    driver: bridge