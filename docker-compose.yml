version: '3.8'

services:
  # API Gateway - Entry point for all requests
  api-gateway:
    build: ./synapse-backend/api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CHAIN_RPC=${CHAIN_RPC}
      - IPFS_NODE=${IPFS_NODE}
    depends_on:
      - ipfs
    networks:
      - synapse-net

  # Job Router - P2P mesh coordinator
  job-router:
    build: ./synapse-backend/job-router
    environment:
      - NODE_ENV=production
      - MESH_BOOTSTRAP=${MESH_BOOTSTRAP}
    networks:
      - synapse-net

  # IPFS Node - Decentralized storage
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - synapse-net

  # The Graph Node - Indexing
  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    environment:
      - postgres_host=postgres
      - postgres_user=graph
      - postgres_pass=graph
      - postgres_db=graph
      - ipfs=ipfs:5001
      - ethereum=${CHAIN_RPC}
      - RUST_LOG=info
    depends_on:
      - postgres
      - ipfs
    networks:
      - synapse-net

  # PostgreSQL - For The Graph (only centralized component, required by Graph Protocol)
  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=graph
      - POSTGRES_PASSWORD=graph
      - POSTGRES_DB=graph
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - synapse-net

  # Synapse Node (example - users run their own)
  synapse-node:
    build: ./synapse-node
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - MESH_ENDPOINT=ws://job-router:8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - synapse-net
    profiles:
      - node

networks:
  synapse-net:
    driver: bridge

volumes:
  ipfs-data:
  postgres-data:
