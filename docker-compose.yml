version: '3.8'

services:
  gateway-api:
    build: ./services/gateway-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ROUTER_URL=http://router:3002
      - DATABASE_URL=/app/data/gateway.db
    volumes:
      - gateway-data:/app/data
    depends_on:
      - router
    networks:
      - synapse

  router:
    build: ./services/router
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    networks:
      - synapse

  node-agent:
    build: ./services/node-agent
    environment:
      - ROUTER_URL=ws://router:3002/ws
      - NODE_WALLET=0xStubNodeWallet123
      - MODEL_PROFILE=echo-stub
      - NODE_ID=stub-node-001
    depends_on:
      - router
    networks:
      - synapse

  web-ui:
    build: ./services/web-ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - gateway-api
    networks:
      - synapse

volumes:
  gateway-data:

networks:
  synapse:
    driver: bridge