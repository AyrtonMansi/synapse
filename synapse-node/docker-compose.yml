# Synapse Node - Docker Compose Configuration
# For running a Synapse inference node with NVIDIA GPU support

version: "3.8"

services:
  # ==========================================================================
  # Main Synapse Node
  # ==========================================================================
  synapse-node:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: synapse-network/node:latest
    container_name: synapse-node
    
    # Runtime configuration
    runtime: nvidia  # Required for NVIDIA GPU support
    
    # GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  # Use all GPUs, or specify count: 1
              capabilities: [gpu]
    
    # Environment variables
    environment:
      # Node identification
      - SYNAPSE_NODE_NAME=${NODE_NAME:-synapse-node}
      - SYNAPSE_NODE_ID=${NODE_ID:-}
      
      # Network configuration
      - SYNAPSE_NETWORK_RPC_URL=${MESH_URL:-wss://mesh.synapse.network/v1/ws}
      - SYNAPSE_API_HOST=0.0.0.0
      - SYNAPSE_API_PORT=8080
      
      # GPU configuration
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - SYNAPSE_GPU_MEMORY_FRACTION=${GPU_MEMORY_FRACTION:-0.9}
      
      # Model configuration
      - SYNAPSE_MODEL_CACHE_DIR=/app/models
      - SYNAPSE_DEFAULT_MODELS=${DEFAULT_MODELS:-meta-llama/Llama-2-7b-chat-hf}
      - SYNAPSE_MAX_MODEL_MEMORY_GB=${MAX_MODEL_MEMORY:-14}
      
      # Inference settings
      - SYNAPSE_MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT:-32}
      - SYNAPSE_REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT:-120}
      - SYNAPSE_MAX_TOKENS_DEFAULT=${MAX_TOKENS:-2048}
      
      # Wallet configuration (IMPORTANT: Set via .env file!)
      - SYNAPSE_WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY:-}
      - SYNAPSE_WALLET_ADDRESS=${WALLET_ADDRESS:-}
      
      # Proof generation
      - SYNAPSE_PROOF_ENABLED=${PROOF_ENABLED:-true}
      - SYNAPSE_PROOF_CIRCUIT_PATH=/app/circuits
      
      # Monitoring
      - SYNAPSE_PROMETHEUS_PORT=9090
      - SYNAPSE_LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # HuggingFace
      - HF_HOME=/app/models
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    
    # Port mappings
    ports:
      - "${API_PORT:-8080}:8080"      # API server
      - "${METRICS_PORT:-9090}:9090"  # Prometheus metrics
    
    # Volumes for persistence
    volumes:
      # Model cache (persistent storage)
      - synapse-models:/app/models
      
      # Proofs and data
      - synapse-data:/app/data
      
      # Logs
      - synapse-logs:/app/logs
      
      # Wallet data (keep this secure!)
      - synapse-wallet:/app/wallet
      
      # Optional: Custom config
      - ./config:/app/config:ro
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (adjust based on your hardware)
    # mem_limit: 32g
    # cpus: '8'
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Optional: Redis for caching
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    restart: unless-stopped
    volumes:
      - synapse-redis:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    # Only enable if you need Redis caching
    profiles:
      - cache

  # ==========================================================================
  # Optional: Prometheus for metrics collection
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: synapse-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - synapse-prometheus:/prometheus
    ports:
      - "${PROMETHEUS_UI_PORT:-9091}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # ==========================================================================
  # Optional: Grafana for metrics visualization
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: synapse-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - synapse-grafana:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

# ============================================================================
# Named volumes for persistence
# ============================================================================
volumes:
  synapse-models:
    driver: local
  synapse-data:
    driver: local
  synapse-logs:
    driver: local
  synapse-wallet:
    driver: local
  synapse-redis:
    driver: local
  synapse-prometheus:
    driver: local
  synapse-grafana:
    driver: local

# ============================================================================
# Network configuration
# ============================================================================
networks:
  default:
    name: synapse-network
    driver: bridge
