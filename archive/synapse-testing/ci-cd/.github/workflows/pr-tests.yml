name: PR Automated Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'

jobs:
  # Fast feedback - run first
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for merge conflicts
        run: |
          git merge-base --is-ancestor origin/main HEAD || exit 1

      - name: Run ESLint on changed files
        run: |
          git diff --name-only origin/main...HEAD | grep -E '\.(ts|tsx|js|jsx)$' | xargs npx eslint || true

      - name: Check PR size
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          if [ $CHANGED_FILES -gt 50 ]; then
            echo "⚠️ Warning: PR contains $CHANGED_FILES changed files. Consider breaking it down."
          fi

      - name: Check for console.logs
        run: |
          if git diff origin/main...HEAD | grep -E '^\+.*console\.(log|warn|error)'; then
            echo "⚠️ Warning: console statements found in changes"
          fi

  # Test affected code only
  affected-tests:
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine affected tests
        id: affected
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.(ts|js)$' || true)
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Run affected unit tests
        run: |
          if [ -n "${{ steps.affected.outputs.changed_files }}" ]; then
            npm run test:unit -- --changedSince=origin/main
          fi

      - name: Report results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results')
            );

            const body = `## Test Results
            - Status: ${{ job.status }}
            - Affected Files: ${{ steps.affected.outputs.changed_files || 'None' }}
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Coverage check
  coverage-check:
    runs-on: ubuntu-latest
    needs: affected-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat reports/coverage/unit/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold of 80%"
            exit 1
          fi
          echo "✅ Coverage: $COVERAGE%"

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('reports/coverage/unit/coverage-summary.json', 'utf8'));
            
            const body = `## Coverage Report
            | Metric | Coverage | Threshold |
            |--------|----------|-----------|
            | Lines | ${summary.total.lines.pct}% | 80% |
            | Functions | ${summary.total.functions.pct}% | 80% |
            | Branches | ${summary.total.branches.pct}% | 75% |
            | Statements | ${summary.total.statements.pct}% | 80% |
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Integration test on PR
  pr-integration-tests:
    runs-on: ubuntu-latest
    needs: coverage-check
    if: contains(github.event.pull_request.labels.*.name, 'needs-integration-tests')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synapse_test
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synapse_test
          REDIS_URL: redis://localhost:6379
