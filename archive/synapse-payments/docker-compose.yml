version: '3.8'

services:
  payments:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/synapse_payments?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - TREASURY_PRIVATE_KEY=${TREASURY_PRIVATE_KEY}
      - TREASURY_ADDRESS=${TREASURY_ADDRESS}
      - HSK_TOKEN_ADDRESS=${HSK_TOKEN_ADDRESS}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
      - redis
    networks:
      - synapse-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synapse_payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - synapse-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - synapse-network

  stripe-cli:
    image: stripe/stripe-cli:latest
    command: listen --api-key ${STRIPE_SECRET_KEY} --forward-to http://payments:3001/stripe/webhook
    depends_on:
      - payments
    networks:
      - synapse-network
    profiles:
      - development

volumes:
  postgres_data:

networks:
  synapse-network:
    external: true