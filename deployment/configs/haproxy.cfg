# HAProxy Configuration for Synapse API Gateway

global
    log stdout local0
    maxconn 4096
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httpchk GET /health
    retries 3

# Stats page
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE

# HTTP to HTTPS redirect
frontend http_redirect
    bind *:80
    redirect scheme https if !{ ssl_fc }

# Main HTTPS frontend
frontend synapse_api
    bind *:443 ssl crt /etc/ssl/certs/synapse.pem alpn h2,http/1.1
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    tcp-request connection track-sc0 src
    tcp-request connection reject if { sc_http_req_rate(0) gt 100 }
    
    # Security headers
    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    
    # ACLs
    acl is_api path_beg /api
    acl is_health path /health
    acl is_metrics path /metrics
    
    # Routes
    use_backend api_gateways if is_api
    use_backend api_gateways if is_health
    use_backend monitoring if is_metrics
    default_backend api_gateways

# API Gateway backend
backend api_gateways
    balance roundrobin
    option httpchk GET /health
    
    server gateway1 api-gateway-1:3000 check inter 2000 rise 2 fall 3
    server gateway2 api-gateway-2:3000 check inter 2000 rise 2 fall 3
    server gateway3 api-gateway-3:3000 check inter 2000 rise 2 fall 3

# Monitoring backend
backend monitoring
    server prometheus prometheus:9090 check
