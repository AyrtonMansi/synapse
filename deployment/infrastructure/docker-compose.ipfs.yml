version: '3.8'

# Synapse IPFS Node Cluster
# Deploys IPFS nodes across 3 regions for high availability

services:
  # ========================================
  # IPFS Node - Region 1 (US East)
  # ========================================
  ipfs-us-east:
    image: ipfs/kubo:latest
    container_name: synapse-ipfs-us-east
    restart: unless-stopped
    ports:
      - "4001:4001/tcp"
      - "4002:4002/udp"
      - "5001:5001"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ipfs-data-us-east:/data/ipfs
      - ./ipfs-config:/container-init.d
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm.key
      - IPFS_API_ADDR=/ip4/0.0.0.0/tcp/5001
      - IPFS_GATEWAY_ADDR=/ip4/0.0.0.0/tcp/8080
    networks:
      - ipfs-cluster
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ========================================
  # IPFS Node - Region 2 (EU West)
  # ========================================
  ipfs-eu-west:
    image: ipfs/kubo:latest
    container_name: synapse-ipfs-eu-west
    restart: unless-stopped
    ports:
      - "4101:4001/tcp"
      - "4102:4002/udp"
      - "5101:5001"
      - "8180:8080"
      - "8181:8081"
    volumes:
      - ipfs-data-eu-west:/data/ipfs
      - ./ipfs-config:/container-init.d
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm.key
      - IPFS_API_ADDR=/ip4/0.0.0.0/tcp/5001
      - IPFS_GATEWAY_ADDR=/ip4/0.0.0.0/tcp/8080
    networks:
      - ipfs-cluster
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ========================================
  # IPFS Node - Region 3 (APAC)
  # ========================================
  ipfs-apac:
    image: ipfs/kubo:latest
    container_name: synapse-ipfs-apac
    restart: unless-stopped
    ports:
      - "4201:4001/tcp"
      - "4202:4002/udp"
      - "5201:5001"
      - "8280:8080"
      - "8281:8081"
    volumes:
      - ipfs-data-apac:/data/ipfs
      - ./ipfs-config:/container-init.d
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm.key
      - IPFS_API_ADDR=/ip4/0.0.0.0/tcp/5001
      - IPFS_GATEWAY_ADDR=/ip4/0.0.0.0/tcp/8080
    networks:
      - ipfs-cluster
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ========================================
  # IPFS Cluster Service
  # ========================================
  ipfs-cluster:
    image: ipfs/ipfs-cluster:latest
    container_name: synapse-ipfs-cluster
    restart: unless-stopped
    environment:
      - CLUSTER_SECRET=${CLUSTER_SECRET}
      - CLUSTER_PEERNAME=synapse-cluster
    ports:
      - "9096:9096"
      - "9095:9095"
      - "9094:9094"
      - "9097:9097"
    volumes:
      - ipfs-cluster-data:/data/ipfs-cluster
    networks:
      - ipfs-cluster
    depends_on:
      - ipfs-us-east

  # ========================================
  # Nginx Load Balancer
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: synapse-ipfs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - ipfs-cluster
    depends_on:
      - ipfs-us-east
      - ipfs-eu-west
      - ipfs-apac

volumes:
  ipfs-data-us-east:
    driver: local
  ipfs-data-eu-west:
    driver: local
  ipfs-data-apac:
    driver: local
  ipfs-cluster-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  ipfs-cluster:
    driver: bridge
