name: Automated Deployment

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  EKS_CLUSTER: synapse-cluster

jobs:
  # Pre-deployment checks
  pre-deploy:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip deploy
        id: check
        run: |
          if git log -1 --pretty=%B | grep -q '\[skip deploy\]'; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "Deployment skipped via commit message"
          else
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify tests passed
        run: |
          # Check that tests passed on this commit
          echo "Verifying test status..."

  # Build and push image
  build:
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: synapse
          VERSION: ${{ needs.pre-deploy.outputs.version }}
        run: |
          IMAGE_TAG="$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION"
          
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag $IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # Deploy to environment
  deploy:
    runs-on: ubuntu-latest
    needs: [pre-deploy, build]
    if: needs.pre-deploy.outputs.should_deploy == 'true'
    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to Kubernetes
        id: deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
        run: |
          # Update deployment
          kubectl set image deployment/synapse \
            synapse=$IMAGE_TAG \
            -n $ENVIRONMENT

          # Wait for rollout
          kubectl rollout status deployment/synapse -n $ENVIRONMENT --timeout=300s

          # Get URL
          URL=$(kubectl get ingress synapse -n $ENVIRONMENT -o jsonpath='{.spec.rules[0].host}')
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Run migration
        run: |
          kubectl exec deployment/synapse -n $ENVIRONMENT -- npm run migrate

      - name: Verify deployment
        run: |
          kubectl get pods -n $ENVIRONMENT
          kubectl get services -n $ENVIRONMENT

  # Post-deployment tests
  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        env:
          BASE_URL: ${{ needs.deploy.outputs.url }}
        run: |
          npx playwright test smoke/

      - name: Health check
        run: |
          curl -f $BASE_URL/health
          curl -f $BASE_URL/ready

  # Rollback on failure
  rollback:
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: failure()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback deployment
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
        run: |
          echo "Rolling back deployment..."
          kubectl rollout undo deployment/synapse -n $ENVIRONMENT
          kubectl rollout status deployment/synapse -n $ENVIRONMENT

      - name: Notify failure
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Deployment failed and rolled back!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nEnvironment: ${{ github.event.inputs.environment }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
