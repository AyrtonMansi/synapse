name: Test Coverage Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: Generate coverage report
        run: |
          npx nyc report --reporter=html --reporter=text --reporter=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

      - name: Generate badge
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          COLOR=$(echo "$COVERAGE > 80" | bc -l && echo "brightgreen" || echo "yellow")
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > coverage-badge.svg

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            coverage-badge.svg

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            
            const format = (n) => n.toFixed(2) + '%';
            const status = (pct, threshold) => pct >= threshold ? '✅' : '❌';
            
            const body = `## 📊 Coverage Report
            
            | Metric | Coverage | Threshold | Status |
            |--------|----------|-----------|--------|
            | Lines | ${format(summary.total.lines.pct)} | 80% | ${status(summary.total.lines.pct, 80)} |
            | Functions | ${format(summary.total.functions.pct)} | 80% | ${status(summary.total.functions.pct, 80)} |
            | Branches | ${format(summary.total.branches.pct)} | 75% | ${status(summary.total.branches.pct, 75)} |
            | Statements | ${format(summary.total.statements.pct)} | 80% | ${status(summary.total.statements.pct, 80)} |
            
            <details>
            <summary>View Full Report</summary>
            
            \`\`\`
            ${fs.readFileSync('coverage/lcov-report/index.html', 'utf8').split('<body>')[1]?.split('</body>')[0] || 'Report generated'}
            \`\`\`
            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if coverage is low
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi
